<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact Us — GoMotarCar</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', sans-serif; color: #111827; background: #F9FAFB; }
    .container { max-width: 800px; margin: 0 auto; padding: 0 24px; }
    header { background: #0D5BD7; color: #fff; padding: 60px 0; text-align: center; }
    header h1 { font-size: 40px; margin-bottom: 8px; }
    header p { opacity: 0.9; font-size: 18px; }
    .back-link { display: inline-block; margin-top: 16px; color: rgba(255,255,255,0.8); text-decoration: none; }
    .back-link:hover { color: #fff; }
    .content { padding: 60px 0; }
    .contact-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 48px; }
    .info h2 { font-size: 24px; margin-bottom: 24px; }
    .info-item { margin-bottom: 24px; }
    .info-item h4 { color: #0D5BD7; margin-bottom: 4px; }
    .info-item p { color: #6B7280; }
    .form-group { margin-bottom: 20px; }
    .form-group label { display: block; margin-bottom: 6px; font-weight: 500; font-size: 14px; color: #374151; }
    .form-group input, .form-group textarea, .form-group select { width: 100%; padding: 12px 16px; border: 1px solid #D1D5DB; border-radius: 8px; font-size: 14px; font-family: inherit; }
    .form-group textarea { height: 120px; resize: vertical; }
    .btn { background: #0D5BD7; color: #fff; padding: 14px 32px; border: none; border-radius: 8px; font-size: 16px; font-weight: 600; cursor: pointer; }
    .btn:hover { background: #0A4DC0; }
    @media (max-width: 768px) { .contact-grid { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <header>
    <div class="container">
      <h1>Contact Us</h1>
      <p>We'd love to hear from you</p>
      <a href="/" class="back-link">← Back to Home</a>
    </div>
  </header>
  <section class="content">
    <div class="container">
      <div class="contact-grid">
        <div class="info">
          <h2>Get in Touch</h2>
          <div class="info-item">
            <h4>📍 Address</h4>
            <p>GoMotarCar HQ, Sector 14, Gurgaon, Haryana - 122001</p>
          </div>
          <div class="info-item">
            <h4>📞 Phone</h4>
            <p>+91-9876543210</p>
          </div>
          <div class="info-item">
            <h4>✉️ Email</h4>
            <p>hello@gomotarcar.com</p>
          </div>
          <div class="info-item">
            <h4>⏰ Business Hours</h4>
            <p>Mon-Sat: 9:00 AM - 8:00 PM<br>Sunday: 10:00 AM - 4:00 PM</p>
          </div>
        </div>
        <form id="contactForm" onsubmit="handleSubmit(event)">
          <div class="form-group">
            <label for="name">Full Name</label>
            <input type="text" id="name" required placeholder="John Doe" />
          </div>
          <div class="form-group">
            <label for="email">Email Address</label>
            <input type="email" id="email" required placeholder="john@example.com" />
          </div>
          <div class="form-group">
            <label for="phone">Phone Number</label>
            <input type="tel" id="phone" placeholder="+91-9876543210" />
          </div>
          <div class="form-group">
            <label for="subject">Subject</label>
            <select id="subject">
              <option>General Inquiry</option>
              <option>Partnership</option>
              <option>Support</option>
              <option>Feedback</option>
              <option>Other</option>
            </select>
          </div>
          <div class="form-group">
            <label for="message">Message</label>
            <textarea id="message" required placeholder="How can we help you?"></textarea>
          </div>
          <button type="submit" class="btn">Send Message</button>
        </form>
      </div>
    </div>
  </section>
  <script>
    async function handleSubmit(e) {
      e.preventDefault();
      const data = { name: e.target.name.value, email: e.target.email.value, phone: e.target.phone.value, subject: e.target.subject.value, message: e.target.message.value };
      try {
        const res = await fetch('/api/v1/cms/contact-requests', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(data) });
        if (res.ok) { alert('Thank you! We will get back to you shortly.'); e.target.reset(); }
        else { alert('Something went wrong. Please try again.'); }
      } catch { alert('Network error. Please try again.'); }
    }
  </script>
</body>
</html>
