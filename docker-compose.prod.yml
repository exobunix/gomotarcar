version: '3.8'

services:
  mongodb:
    image: mongo:7
    container_name: gomotarcar-mongodb-prod
    restart: unless-stopped
    ports:
      - "127.0.0.1:27017:27017"
    volumes:
      - mongodb_prod_data:/data/db
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USERNAME:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD:-changeme123}
      MONGO_INITDB_DATABASE: gomotarcar
    healthcheck:
      test: mongosh --quiet --eval 'db.runCommand({ping:1}).ok' -u $MONGO_INITDB_ROOT_USERNAME -p $MONGO_INITDB_ROOT_PASSWORD
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s
    networks:
      - backend-network

  redis:
    image: redis:7-alpine
    container_name: gomotarcar-redis-prod
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-changeme123} --appendonly yes
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_prod_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    networks:
      - backend-network

  backend:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: gomotarcar-backend
    restart: unless-stopped
    ports:
      - "127.0.0.1:5000:5000"
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - ./server/.env
    environment:
      NODE_ENV: production
      REDIS_URL: redis://:${REDIS_PASSWORD:-changeme123}@redis:6379
      MONGODB_URI: mongodb://${MONGO_ROOT_USERNAME:-admin}:${MONGO_ROOT_PASSWORD:-changeme123}@mongodb:27017/gomotarcar?authSource=admin
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - backend-network

  admin-panel:
    build:
      context: ./admin-panel
      dockerfile: Dockerfile
    container_name: gomotarcar-admin
    ports:
      - "127.0.0.1:3000:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    networks:
      - frontend-network

networks:
  backend-network:
    driver: bridge
    internal: false
  frontend-network:
    driver: bridge
    internal: false

volumes:
  mongodb_prod_data:
    driver: local
  redis_prod_data:
    driver: local
