version: '3.8'

services:
  mongodb:
    image: mongo:7
    container_name: gomotarcar-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: gomotarcar

  redis:
    image: redis:7-alpine
    container_name: gomotarcar-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  backend:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: gomotarcar-backend
    ports:
      - "5000:5000"
    depends_on:
      - mongodb
      - redis
    env_file:
      - ./server/.env
    volumes:
      - ./server:/app
      - /app/node_modules
    command: npm run dev

volumes:
  mongodb_data:
  redis_data:
