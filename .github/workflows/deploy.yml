name: GoMotarCar Deploy

on:
  push:
    branches: [main, staging]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: 20
  DOCKER_REGISTRY: ghcr.io

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: server/package-lock.json

      - name: Install dependencies
        run: cd server && npm ci

      - name: Lint
        run: cd server && npm run lint

      - name: Run tests
        run: cd server && npm test
        env:
          MONGODB_URI: mongodb://localhost:27017/test
          JWT_SECRET: test-secret
          NODE_ENV: test

  docker-build:
    name: Build Docker Images
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.DOCKER_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend
        uses: docker/build-push-action@v5
        with:
          context: ./server
          push: true
          tags: |
            ${{ env.DOCKER_REGISTRY }}/${{ github.repository }}/backend:latest
            ${{ env.DOCKER_REGISTRY }}/${{ github.repository }}/backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push admin panel
        uses: docker/build-push-action@v5
        with:
          context: ./admin-panel
          push: true
          tags: |
            ${{ env.DOCKER_REGISTRY }}/${{ github.repository }}/admin-panel:latest
            ${{ env.DOCKER_REGISTRY }}/${{ github.repository }}/admin-panel:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-staging:
    name: Deploy to Staging
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/staging'
    steps:
      - name: Deploy to staging server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.STAGING_SERVER_HOST }}
          username: ${{ secrets.STAGING_SERVER_USER }}
          key: ${{ secrets.STAGING_SSH_PRIVATE_KEY }}
          script: |
            cd /opt/gomotarcar-staging
            git pull origin staging
            cd server && npm ci --production && npm run migrate
            pm2 restart gomotarcar-staging-api || pm2 start src/index.js --name gomotarcar-staging-api
            echo "Waiting for health check..."
            for i in $(seq 1 12); do
              if curl -sf http://localhost:5000/health > /dev/null 2>&1; then
                echo "Health check passed!"
                break
              fi
              echo "Attempt $i: waiting for server...";
              sleep 5;
            done

  deploy-backend:
    name: Deploy Backend
    needs: docker-build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Deploy to production server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /opt/gomotarcar
            
            # Run database migrations
            echo "Running database migrations..."
            docker compose -f docker-compose.prod.yml run --rm backend npm run migrate
            
            # Pull and deploy new backend image
            echo "Pulling latest backend image..."
            docker compose -f docker-compose.prod.yml pull backend
            docker compose -f docker-compose.prod.yml up -d --force-recreate backend
            
            # Verify health check
            echo "Verifying health check..."
            for i in $(seq 1 12); do
              HEALTH=$(curl -sf http://localhost:5000/health 2>/dev/null || echo "failed")
              if echo "$HEALTH" | grep -q '"status":"ok"'; then
                echo "✅ Health check passed on attempt $i"
                break
              fi
              echo "Attempt $i: waiting for server...";
              sleep 5;
            done
            
            # Clean up old images
            docker image prune -f
            echo "Deployment complete"

  deploy-admin:
    name: Deploy Admin Panel
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install & Build
        run: |
          cd admin-panel
          npm ci --legacy-peer-deps
          npm run build

      - name: Deploy to Vercel
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          vercel-args: '--prod'

  notify:
    name: Notify
    needs: [deploy-backend, deploy-admin, deploy-staging]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Notify Slack
        uses: 8398a7/action-slack@v3
        with:
          status: ${{ job.status }}
          fields: repo,message,commit,author,action,workflow
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
